<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <h1 id="bookingPageTitle">حجز موعد</h1>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="doctors.html">الأطباء</a>
        <a href="booking.html">حجز موعد</a>
        <a href="contact.html">تواصل معنا</a>
    </nav>

</header>

<div class="language-buttons">
    <button onclick="changeToArabicBooking()">العربية</button>
    <button onclick="changeToEnglishBooking()">English</button>
</div>

<section class="home">

    <h2 id="formTitle">نموذج الحجز</h2>

    <form>

        <label id="nameLabel">الاسم الكامل</label><br>
        <input type="text"><br><br>

        <label id="phoneLabel">رقم الهاتف</label><br>
        <input type="tel"><br><br>

        <label id="doctorLabel">اختر الطبيب</label><br>
        <select>
            <option id="doctorOption">اختر الطبيب</option>
            <option>د. أحمد محمد</option>
            <option>د. سارة علي</option>
            <option>د. محمد حسن</option>
        </select><br><br>

        <label id="dateLabel">تاريخ الحجز</label><br>
        <input type="date"><br><br>

        <button type="submit" id="bookBtn">حجز</button>

    </form>

</section>

<script src="script.js"></script>

</body>
</html>
