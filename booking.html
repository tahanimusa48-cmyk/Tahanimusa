<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - عيادة الشفاء</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<header>
    <h1 id="bookingPageTitle">حجز موعد</h1>

    <nav>
        <a href="home.html">الرئيسية</a>
        <a href="doctors.html">الأطباء</a>
        <a href="booking.html">حجز موعد</a>
        <a href="contact.html">تواصل معنا</a>
    </nav>
</header>

<div class="language-buttons">
    <button onclick="changeToArabicBooking()">العربية</button>
    <button onclick="changeToEnglishBooking()">English</button>
</div>

<section class="home">
    <h2 id="formTitle">نموذج الحجز</h2>

<form class="booking-form" id="mainBookingForm" onsubmit="event.preventDefault(); handleBookingSubmit();">
        <div class="form-group">
            <label id="nameLabel">الاسم الكامل</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label id="phoneLabel">رقم الهاتف</label>
            <input type="tel" required>
        </div>

        <div class="form-group">
            <label id="doctorLabel">اختر الطبيب</label>
            <select required>
                <option value="" id="doctorOption">اختر الطبيب</option>
                <option>د. أحمد محمد</option>
                <option>د. سارة علي</option>
                <option>د. محمد حسن</option>
            </select>
        </div>

        <div class="form-group">
            <label id="dateLabel">تاريخ الحجز</label>
            <input type="date" required>
        </div>

        <button type="submit" id="bookBtn">حجز</button>
    </form>
</section>

<script src="js/script.js"></script>

</body>
</html>
