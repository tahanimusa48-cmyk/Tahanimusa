<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - عيادة الشفاء</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1 id="contactPageTitle">تواصل معنا</h1>

    <nav>
        <a href="home.html">الرئيسية</a>
        <a href="doctors.html">الأطباء</a>
        <a href="booking.html">حجز موعد</a>
        <a href="contact.html">تواصل معنا</a>
    </nav>
</header>

<div class="language-buttons">
    <button onclick="changeToArabicContact()">العربية</button>
    <button onclick="changeToEnglishContact()">English</button>
</div>

<section class="home">
    <h2 id="contactTitle">أرسل رسالة</h2>

    <!-- تم تنظيم الفورم وتنسيقه ليكون متجاوباً بالكامل -->
    <form class="booking-form" onsubmit="event.preventDefault(); alert('تم إرسال رسالتك بنجاح! شكراً لك.');">
        <div class="form-group">
            <label id="contactNameLabel">الاسم الكامل</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label id="emailLabel">البريد الإلكتروني</label>
            <input type="email" required>
        </div>

        <div class="form-group">
            <label id="messageLabel">الرسالة</label>
            <textarea rows="5" required style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; resize: vertical; box-sizing: border-box; background-color: #fdfdfd;"></textarea>
        </div>

        <button type="submit" id="sendBtn">إرسال</button>
    </form>
</section>

<script src="js/script.js"></script>

</body>
</html>
