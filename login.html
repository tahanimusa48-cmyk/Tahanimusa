<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | تسجيل الدخول</title>

<link rel="stylesheet" href="style.css">
</head>

<body class="home">

<div class="login-box">

<div class="language">
<button onclick="changeToArabicLogin()">العربية</button>
<button onclick="changeToEnglishLogin()">English</button>
</div>

<h1 id="clinicTitle">عيادة الشفاء</h1>

<h2 id="loginTitle">تسجيل الدخول</h2>

<label id="emailLabel">البريد الإلكتروني</label>

<input type="email" id="email" placeholder="أدخل البريد الإلكتروني">

<label id="passwordLabel">كلمة المرور</label>

<input type="password" id="password" placeholder="أدخل كلمة المرور">

<button id="loginBtn" onclick="window.location.href='index.html'">
تسجيل الدخول
</button>

<p id="registerText">
ليس لديك حساب؟
<a href="register.html" id="registerLink">
إنشاء حساب
</a>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
