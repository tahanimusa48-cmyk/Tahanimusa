<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-box">

<h1>عيادة الشفاء</h1>

<h2>إنشاء حساب جديد</h2>

<form>

<label>الاسم الكامل</label><br>
<input type="text" placeholder="أدخل اسمك الكامل" required><br><br>

<label>اسم المستخدم</label><br>
<input type="text" placeholder="أدخل اسم المستخدم" required><br><br>

<label>البريد الإلكتروني</label><br>
<input type="email" placeholder="أدخل البريد الإلكتروني" required><br><br>

<label>رقم الهاتف</label><br>
<input type="tel" placeholder="أدخل رقم الهاتف" required><br><br>

<label>كلمة المرور</label><br>
<input type="password" placeholder="أدخل كلمة المرور" required><br><br>

<label>تأكيد كلمة المرور</label><br>
<input type="password" placeholder="أعد كتابة كلمة المرور" required><br><br>
<button type="button" onclick="window.location.href='login.html'">
إنشاء حساب
</button>

</form>

<p>
لديك حساب بالفعل؟
<a href="login.html">تسجيل الدخول</a>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
