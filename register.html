<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | عيادة الشفاء</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body class="login-page"> <!-- استخدمنا نفس كلاس الخلفية لتوحيد المظهر -->

<div class="login-box">
    <!-- أزرار تغيير اللغة لصفحة إنشاء الحساب -->
    <div class="language">
        <button onclick="changeToArabicRegister()">العربية</button>
        <button onclick="changeToEnglishRegister()">English</button>
    </div>

    <h1 id="registerClinicTitle">عيادة الشفاء</h1>
    <h2 id="registerPageTitle">إنشاء حساب جديد</h2>

    <form class="register-form" onsubmit="event.preventDefault(); handleRegister();">
        <div class="form-group-reg">
            <label id="regNameLabel">الاسم الكامل</label>
            <input type="text" id="regName" placeholder="أدخل اسمك الكامل" required>
        </div>

        <div class="form-group-reg">
            <label id="regUserLabel">اسم المستخدم</label>
            <input type="text" id="regUser" placeholder="أدخل اسم المستخدم" required>
        </div>

        <div class="form-group-reg">
            <label id="regEmailLabel">البريد الإلكتروني</label>
            <input type="email" id="regEmail" placeholder="أدخل البريد الإلكتروني" required>
        </div>

        <div class="form-group-reg">
            <label id="regPhoneLabel">رقم الهاتف</label>
            <input type="tel" id="regPhone" placeholder="أدخل رقم الهاتف" required>
        </div>

        <div class="form-group-reg">
            <label id="regPassLabel">كلمة المرور</label>
            <input type="password" id="regPass" placeholder="أدخل كلمة المرور" required>
        </div>

        <div class="form-group-reg">
            <label id="regConfirmLabel">تأكيد كلمة المرور</label>
            <input type="password" id="regConfirm" placeholder="أعِد كتابة كلمة المرور" required>
        </div>

        <button type="submit" id="registerBtn">إنشاء حساب</button>
    </form>

    <p id="hasAccountText">
        لديك حساب بالفعل؟
        <a href="index.html" id="loginLinkText">تسجيل الدخول</a> <!-- تم التعديل إلى index.html لأنها صفحة اللوجن الجديدة -->
    </p>
</div>

<script src="js/script.js"></script>

</body>
</html>
